services:
  app:
    build:
      context: .
      target: development
    command: >
      sh -lc "npx concurrently -c '#93c5fd,#c4b5fd'
      'php -d opcache.enable=0 -d opcache.enable_cli=0 artisan serve --host=0.0.0.0 --port=8000'
      'npm run dev -- --host 0.0.0.0'
      --names=server,vite --kill-others"
    ports:
      - "4002:8000"
      - "4173:5173"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:4002
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      MUNKI_REPO_PATH: /var/www/html/storage/app/munki_repo
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      - munki_repo:/var/www/html/storage/app/munki_repo

volumes:
  vendor:
  node_modules:
  munki_repo:
