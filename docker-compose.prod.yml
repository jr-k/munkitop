services:
  app:
    image: ghcr.io/jr-k/munkimyadmin:latest
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8000"
    environment:
      APP_NAME: "Munki My Admin"
      APP_DISPLAY_NAME: ${APP_DISPLAY_NAME:-Munki My Admin}
      APP_VERSION: ${APP_VERSION:-dev}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database-data/database.sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MUNKI_REPO_PATH: /var/www/html/storage/app/munki_repo
      MUNKI_DEFAULT_CATALOG: ${MUNKI_DEFAULT_CATALOG:-production}
      MUNKI_BASE_MANIFEST: ${MUNKI_BASE_MANIFEST:-base}
    volumes:
      - sqlite_data:/var/www/html/database-data
      - app_storage:/var/www/html/storage
      - munki_repo:/var/www/html/storage/app/munki_repo
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
  app_storage:
  munki_repo:
